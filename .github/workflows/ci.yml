name: iTicket.AZ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install TypeScript
        run: npm install typescript --save-dev

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx tsc

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t iticket-api:${{ github.sha }} .

      - name: Verify health endpoint exists in build
        run: |
          docker run --rm -d \
            --name iticket-test \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=test \
            -e DB_USERNAME=test \
            -e DB_PASSWORD=test \
            -e PORT=3000 \
            -e JWT_SECRET=test \
            iticket-api:${{ github.sha }} || true
          sleep 3
          docker rm -f iticket-test || true
          echo "Docker build verified successfully"